<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" 
          content="width=device-width, initial-scale=1.0">
    <title>OTDR Detector</title>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }

        body {
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg,#1a1a2e,#16213e);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .card {
            background: white;
            border-radius: 20px;
            padding: 30px;
            width: 100%;
            max-width: 420px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }

        .header {
            text-align: center;
            margin-bottom: 25px;
        }

        .logo { font-size: 2.5em; margin-bottom: 10px; }

        .header h1 {
            font-size: 1.4em;
            color: #1a1a2e;
            margin-bottom: 5px;
        }

        .header p { color: #888; font-size: 0.85em; }

        label {
            display: block;
            font-weight: 600;
            color: #333;
            margin-bottom: 8px;
            font-size: 0.9em;
        }

        input[type="number"] {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 1em;
            outline: none;
            margin-bottom: 20px;
        }

        input[type="number"]:focus {
            border-color: #3498db;
        }

        .scenario-btns {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 8px;
            margin-bottom: 20px;
        }

        .scen-btn {
            padding: 10px 5px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            background: white;
            cursor: pointer;
            font-size: 0.75em;
            font-weight: 600;
            text-align: center;
            transition: all 0.3s;
        }

        .scen-btn.active {
            border-color: #3498db;
            background: #3498db;
            color: white;
        }

        .detect-btn {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg,#3498db,#2980b9);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 1.1em;
            font-weight: 700;
            cursor: pointer;
            letter-spacing: 1px;
            transition: all 0.3s;
        }

        .detect-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(52,152,219,0.4);
        }

        .result-box {
            margin-top: 25px;
            padding: 20px;
            border-radius: 15px;
            text-align: center;
            display: none;
            animation: fadeIn 0.5s ease;
        }

        @keyframes fadeIn {
            from { opacity:0; transform:translateY(10px); }
            to   { opacity:1; transform:translateY(0); }
        }

        .result-emoji  { font-size: 3em; margin-bottom: 10px; }
        .result-title  { font-size: 1.3em; font-weight: 700;
                         color: white; margin-bottom: 5px; }
        .result-msg    { font-size: 0.85em;
                         color: rgba(255,255,255,0.9);
                         margin-bottom: 10px; }

        .confidence-badge {
            display: inline-block;
            background: rgba(255,255,255,0.25);
            color: white;
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 0.85em;
            font-weight: 600;
        }

        .signal-chart {
            margin-top: 20px;
            background: #f8f9fa;
            border-radius: 12px;
            padding: 15px;
            display: none;
        }

        .signal-chart h4 {
            font-size: 0.85em;
            color: #666;
            margin-bottom: 10px;
            text-align: center;
        }

        canvas { width:100% !important; height:120px !important; }

        .loading {
            text-align: center;
            padding: 20px;
            color: #888;
            display: none;
        }

        .spinner {
            width: 30px; height: 30px;
            border: 3px solid #e0e0e0;
            border-top-color: #3498db;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 10px;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        .info-bar {
            display: flex;
            justify-content: space-between;
            margin-top: 15px;
            font-size: 0.75em;
            color: #aaa;
        }
    </style>
</head>
<body>
<div class="card">

    <div class="header">
        <div class="logo">📡</div>
        <h1>OTDR Anomaly Detector</h1>
        <p>Réseau FTTH/GPON — SVM Intelligence</p>
    </div>

    <div class="form-group">
        <label>📏 Distance OLT → ONT (km)</label>
        <input type="number" id="distance"
               value="10" min="0.5" max="20" step="0.5">
    </div>

    <div class="form-group">
        <label>🔧 Type de Signal</label>
        <div class="scenario-btns">
            <button class="scen-btn active"
                    onclick="selectScen(this,'normal')">
                ✅<br>Normal
            </button>
            <button class="scen-btn"
                    onclick="selectScen(this,'anomalie')">
                🔴<br>Anomalie
            </button>
            <button class="scen-btn"
                    onclick="selectScen(this,'attaque')">
                ⚠️<br>Attaque
            </button>
        </div>
    </div>

    <button class="detect-btn" onclick="detect()">
        🔍 ANALYSER LE SIGNAL
    </button>

    <div class="loading" id="loading">
        <div class="spinner"></div>
        Analyse en cours...
    </div>

    <div class="result-box" id="result">
        <div class="result-emoji" id="res-emoji"></div>
        <div class="result-title" id="res-title"></div>
        <div class="result-msg"   id="res-msg"></div>
        <div class="confidence-badge" id="res-conf"></div>
    </div>

    <div class="signal-chart" id="chart-box">
        <h4>📊 Signal OTDR Analysé</h4>
        <canvas id="signalChart"></canvas>
    </div>

    <div class="info-bar">
        <span>🤖 SVM RBF | 18 Features</span>
        <span>⚡ ~0.009ms/signal</span>
    </div>

</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/3.9.1/chart.min.js"></script>
<script>
let selectedScen  = 'normal';
let chartInstance = null;

function selectScen(btn, scen) {
    document.querySelectorAll('.scen-btn')
            .forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    selectedScen = scen;
}

async function detect() {
    const dist = document.getElementById('distance').value;

    document.getElementById('loading').style.display  = 'block';
    document.getElementById('result').style.display   = 'none';
    document.getElementById('chart-box').style.display = 'none';

    try {
        const res = await fetch('/predict', {
            method:  'POST',
            headers: {'Content-Type': 'application/json'},
            body:    JSON.stringify({
                distance: dist,
                scenario: selectedScen
            })
        });

        const data = await res.json();
        document.getElementById('loading').style.display = 'none';

        const box = document.getElementById('result');
        box.style.background = data.color;
        box.style.display    = 'block';

        document.getElementById('res-emoji').textContent =
            data.emoji;
        document.getElementById('res-title').textContent =
            data.prediction;
        document.getElementById('res-msg').textContent   =
            data.message;
        document.getElementById('res-conf').textContent  =
            '🎯 Confiance : ' + data.confidence;

        drawSignal(data.signal, data.color);

    } catch(e) {
        document.getElementById('loading').style.display = 'none';
        alert('Erreur de connexion au serveur!');
    }
}

function drawSignal(signalData, color) {
    document.getElementById('chart-box').style.display = 'block';
    const canvas = document.getElementById('signalChart');
    const ctx    = canvas.getContext('2d');
    const step   = Math.floor(signalData.length / 200);
    const data   = signalData.filter((_,i) => i % step === 0);
    const labels = data.map((_,i) =>
        ((i*step/signalData.length)*20).toFixed(1));

    if (chartInstance) chartInstance.destroy();

    chartInstance = new Chart(ctx, {
        type: 'line',
        data: {
            labels: labels,
            datasets: [{
                data:        data,
                borderColor: color,
                borderWidth: 2,
                pointRadius: 0,
                fill:        false,
                tension:     0.3
            }]
        },
        options: {
            responsive: true,
            plugins: { legend: { display: false } },
            scales: {
                x: {
                    title: {
                        display: true,
                        text: 'Distance (km)',
                        font: { size: 10 }
                    },
                    ticks: { maxTicksLimit: 6,
                             font: { size: 9 } }
                },
                y: {
                    title: {
                        display: true,
                        text: 'Amplitude',
                        font: { size: 10 }
                    },
                    ticks: { font: { size: 9 } }
                }
            }
        }
    });
}
</script>
</body>
</html>
